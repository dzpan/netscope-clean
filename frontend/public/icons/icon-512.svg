<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="64" fill="#0a0a0f"/>
  <g transform="translate(256,256)">
    <!-- Globe circle -->
    <circle r="150" fill="none" stroke="#f97316" stroke-width="8"/>
    <!-- Horizontal lines -->
    <ellipse rx="150" ry="54" fill="none" stroke="#f97316" stroke-width="5" opacity="0.6"/>
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#f97316" stroke-width="5" opacity="0.6"/>
    <!-- Vertical meridian -->
    <ellipse rx="54" ry="150" fill="none" stroke="#f97316" stroke-width="5" opacity="0.6"/>
    <!-- Network nodes -->
    <circle cx="0" cy="-150" r="18" fill="#f97316"/>
    <circle cx="130" cy="75" r="18" fill="#f97316"/>
    <circle cx="-130" cy="75" r="18" fill="#f97316"/>
    <circle cx="0" cy="0" r="20" fill="#f97316"/>
    <!-- Network edges -->
    <line x1="0" y1="-150" x2="130" y2="75" stroke="#f97316" stroke-width="5" opacity="0.4"/>
    <line x1="130" y1="75" x2="-130" y2="75" stroke="#f97316" stroke-width="5" opacity="0.4"/>
    <line x1="-130" y1="75" x2="0" y2="-150" stroke="#f97316" stroke-width="5" opacity="0.4"/>
    <line x1="0" y1="0" x2="0" y2="-150" stroke="#f97316" stroke-width="5" opacity="0.4"/>
    <line x1="0" y1="0" x2="130" y2="75" stroke="#f97316" stroke-width="5" opacity="0.4"/>
    <line x1="0" y1="0" x2="-130" y2="75" stroke="#f97316" stroke-width="5" opacity="0.4"/>
  </g>
</svg>
